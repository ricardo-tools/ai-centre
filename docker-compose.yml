version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-centre-db
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: aicentre
      POSTGRES_PASSWORD: aicentre
      POSTGRES_DB: aicentre
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U aicentre']
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
